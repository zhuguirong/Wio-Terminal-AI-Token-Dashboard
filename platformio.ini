[env:seeed_wio_terminal]
platform = atmelsam
board = seeed_wio_terminal
framework = arduino
; Display rendering intentionally uses Seeed_Arduino_LCD. It provides
; TFT_eSPI.h with the Wio Terminal screen configuration patched by Seeed.
lib_deps =
  https://github.com/Seeed-Studio/Seeed_Arduino_LCD.git
  https://github.com/Seeed-Studio/Seeed_Arduino_FS.git
  https://github.com/Seeed-Studio/Seeed_Arduino_rpcUnified.git
  https://github.com/Seeed-Studio/Seeed_Arduino_rpcBLE.git
  bblanchon/ArduinoJson
monitor_speed = 115200
